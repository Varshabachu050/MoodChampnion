<!-- templates/main.html -->

{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose Your Mood</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#c2e9fb,#fbc2eb);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h2{
margin-bottom:30px;
color:#333;
}

.mood-grid{
display:grid;
grid-template-columns:repeat(3,150px);
gap:20px;
}

.mood-card{
background:white;
border-radius:15px;
padding:20px;
text-align:center;
cursor:pointer;
font-size:18px;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
transition:transform 0.2s,box-shadow 0.2s;
}

.mood-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.emoji{
font-size:40px;
display:block;
margin-bottom:10px;
}

a{
text-decoration:none;
color:black;
}

</style>

</head>

<body>

<h2>💭 How are you feeling today?</h2>

<div class="mood-grid">

<a href="/mood/happy">
<div class="mood-card">
<span class="emoji">😊</span>
Happy
</div>
</a>

<a href="/mood/sad">
<div class="mood-card">
<span class="emoji">😢</span>
Sad
</div>
</a>

<a href="/mood/lonely">
<div class="mood-card">
<span class="emoji">🙁</span>
Lonely
</div>
</a>

<a href="/mood/tired">
<div class="mood-card">
<span class="emoji">😴</span>
Tired
</div>
</a>

<a href="/mood/angry">
<div class="mood-card">
<span class="emoji">😡</span>
Angry
</div>
</a>

<a href="/mood/calm">
<div class="mood-card">
<span class="emoji">🧘</span>
Calm
</div>
</a>

</div>

</body>
</html>

{% endblock %}
