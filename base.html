<!-- templates/base.html -->

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mood Therapy Games</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* main page container */

.container{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:40px 20px;
text-align:center;
}

/* page titles */

h2{
margin-top:10px;
margin-bottom:15px;
color:#333;
}

/* game stats bar */

#top-bar{
margin-top:10px;
margin-bottom:15px;
display:flex;
justify-content:center;
gap:30px;
font-size:18px;
font-weight:bold;
background:white;
padding:10px 20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* buttons */

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:8px;
background:#2c3e50;
color:white;
cursor:pointer;
font-size:15px;
transition:all 0.2s;
}

button:hover{
background:#34495e;
transform:scale(1.05);
}

/* inputs */

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

/* game quote / message */

.quote{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#1a237e;
}

/* game container */

.game-box{
margin-top:20px;
}

</style>

</head>

<body>

<header>
🧠 Mood Therapy Games
</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
